<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AIDetector.cx</title>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      color: #333;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      color: #1e3a8a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      margin-bottom: 12px;
      resize: vertical;
      font-family: inherit;
      font-size: 14px;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    button.detect { background: #2563eb; color: white; }
    button.detect:hover { background: #1d4ed8; }
    button.humanize { background: #10b981; color: white; }
    button.humanize:hover { background: #059669; }
    button.connect { background: #f59e0b; color: white; width: 100%; margin-bottom: 12px;}
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    .result {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 12px; display: none; margin-bottom: 12px;
    }
    .result.visible { display: block; }
    .result-title { font-weight: bold; margin-bottom: 4px; font-size: 14px; }
    .result-text { font-size: 13px; color: #475569; line-height: 1.4; white-space: pre-wrap; }
    .footer { text-align: center; font-size: 12px; color: #64748b; margin-top: 16px; }
    #loading { display: none; text-align: center; padding: 10px; color: #64748b; font-size: 14px; }
    #error { display: none; color: #ef4444; background: #fef2f2; border: 1px solid #fecaca; padding: 8px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
    #disconnected { display: none; text-align: center; padding: 10px; background: #fffbeb; color: #b45309; border: 1px solid #fde68a; border-radius: 6px; margin-bottom: 12px; font-size: 13px;}
  </style>
</head>
<body>
  <h2><img src="icons/icon48.png" width="24" height="24" alt="logo" style="border-radius:4px;"> AIDetector.cx</h2>
  
  <div id="disconnected">
    <p>Please connect your account to use the extension.</p>
    <button class="connect" id="btnConnect">Connect to AIDetector.cx</button>
  </div>

  <div id="mainUI">
    <div id="contextArea" style="display: none; font-size: 11px; color: #64748b; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: #f1f5f9; padding: 4px 6px; border-radius: 4px;"></div>
    <textarea id="inputText" placeholder="Paste text here or select text on the page..."></textarea>
    
    <div style="margin-bottom: 12px;">
      <button id="btnGetPageText" style="width: 100%; background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; font-weight: 500;">Use Current Page Text</button>
    </div>

    <div class="actions">
      <button class="detect" id="btnDetect">Detect AI</button>
      <button class="humanize" id="btnHumanize">Humanize</button>
    </div>
    
    <div id="loading">Processing...</div>
    <div id="error"></div>
    <div id="resultBox" class="result">
      <div class="result-title" style="display: flex; justify-content: space-between; align-items: center;">
        <span id="resultTitle">Result</span>
        <button id="btnCopy" style="display: none; padding: 3px 8px; font-size: 11px; background: #e2e8f0; color: #333; width: auto; flex: none;">Copy</button>
      </div>
      <div class="result-text" id="resultText"></div>
    </div>
  </div>

  <div class="footer">
    Powered by AIDetector.cx
  </div>

  <script src="popup.js"></script>
</body>
</html>
